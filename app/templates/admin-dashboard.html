{% extends "admin-layout.html" %}
{% block body %}
<div class="card">
	<div class="card-header">
		<span class="card-title">管理后台</span>
	</div>
	<div class="stats-cards">
		<div class="stat-card">
			<div class="stat-icon blue">
				<i class="fa fa-users"></i>
			</div>
			<div class="stat-info">
				<h3>0</h3>
				<p>用户总数</p>
			</div>
		</div>
		<div class="stat-card">
			<div class="stat-icon green">
				<i class="fa fa-robot"></i>
			</div>
			<div class="stat-info">
				<h3>0</h3>
				<p>数字员工</p>
			</div>
		</div>
		<div class="stat-card">
			<div class="stat-icon orange">
				<i class="fa fa-cogs"></i>
			</div>
			<div class="stat-info">
				<h3>0</h3>
				<p>模型数量</p>
			</div>
		</div>
		<div class="stat-card">
			<div class="stat-icon red">
				<i class="fa fa-eye"></i>
			</div>
			<div class="stat-info">
				<h3>0</h3>
				<p>瞭望源</p>
			</div>
		</div>
	</div>
	<div style="text-align:center; padding:60px 0; color:#999;">
		<i class="fa fa-laptop-code" style="font-size:64px; margin-bottom:20px; display:block;"></i>
		<h3>后台管理框架</h3>
		<p>预留页面，待所有模块开发完成后实现</p>
	</div>
</div>
{% end %}

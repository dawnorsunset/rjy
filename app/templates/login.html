{% extends "user-login-base.html" %}
{% block body %}
<form method="post" action="/auth/login" class="login-form">
	{% module xsrf_form_html() %}
	
	{% if error %}
	<div class="error-message">
		<i class="fa fa-exclamation-circle"></i>
		<span>{{ error }}</span>
	</div>
	{% end %}
	
	<div class="form-group">
		<label for="username">手机/邮箱/用户名</label>
		<input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
	</div>
	
	<div class="form-group">
		<label for="password">请输入您的登录密码</label>
		<input type="password" id="password" name="password" placeholder="请输入密码" required>
	</div>
	
	<div class="form-options">
		<label>
			<input type="checkbox" name="remember"> 记住用户名
		</label>
		<a href="#">忘记密码</a>
	</div>
	
	<button type="submit" class="submit-btn">
		立即登录
	</button>
	
	<div class="register-link">
		没有账户？<a href="#">马上注册</a>
	</div>
</form>
{% end %}
